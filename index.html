<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Snake Game - Advanced</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .score-board {
            background: rgba(15, 25, 35, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 166, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .score-board h1 { margin: 0; font-size: 16px; color: #aaa; text-transform: uppercase; }
        .score-board p { margin: 5px 0 0 0; font-size: 24px; font-weight: bold; color: #00ffa6; }

        #settings-btn {
            background: rgba(15, 25, 35, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            color: white;
            outline: none;
        }
        #settings-btn:hover { background: rgba(255, 255, 255, 0.2); transform: rotate(45deg); }

        #settings-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 25, 30, 0.95);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            z-index: 30;
            width: 300px;
        }
        #settings-modal h2 { margin-top: 0; color: #00ffa6; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; background: transparent; outline: none; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00ffa6; }
        
        .close-btn {
            width: 100%;
            padding: 12px;
            background: #00ffa6;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .close-btn:hover { background: #00cc85; }

        #game-over {
            display: none;
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 0, 0, 0.95);
            padding: 40px; border-radius: 15px;
            border: 2px solid #ff3333;
            text-align: center; z-index: 20;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.4);
        }
        #game-over h2 { color: #ff3333; margin-top: 0; font-size: 32px; }
        #game-over button { margin-top: 15px; padding: 12px 25px; background: #00ffa6; color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        #game-over button:hover { background: #00cc85; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="score-board">
            <h1>Score</h1>
            <p id="score">0</p>
        </div>
        <button id="settings-btn">⚙️</button>
    </div>

    <div id="settings-modal">
        <h2>ගැලපීම් (Settings)</h2>
        
        <div class="setting-group">
            <label>සර්පයාගේ වර්ණය:</label>
            <input type="color" id="snake-color" value="#00ffa6">
        </div>
        
        <div class="setting-group">
            <label>ආහාරයේ වර්ණය:</label>
            <input type="color" id="food-color" value="#ff3333">
        </div>

        <div class="setting-group">
            <label>පුවරුවේ (Grid) වර්ණය:</label>
            <input type="color" id="grid-color" value="#00ffa6">
        </div>

        <div class="setting-group">
            <label>මූලික වේගය (Speed):</label>
            <input type="range" id="speed-slider" min="1" max="10" value="5">
        </div>

        <button class="close-btn" id="close-settings">සුරකින්න & ක්‍රීඩා කරන්න</button>
    </div>

    <div id="game-over">
        <h2>Game Over!</h2>
        <p>ඔබේ ලකුණු: <span id="final-score">0</span></p>
        <button onclick="location.reload()">නැවත ක්‍රීඩා කරන්න</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 18, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // ආරම්භක වර්ණ
        let defaultSnakeColor = new THREE.Color("#00ffa6");
        let defaultFoodColor = new THREE.Color("#ff3333");
        let defaultGridColor = new THREE.Color("#00ffa6");

        let gridHelper = new THREE.GridHelper(20, 20, defaultGridColor, 0x444444);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        const snakeMaterial = new THREE.MeshPhongMaterial({ color: defaultSnakeColor, shininess: 100 });
        const foodMaterial = new THREE.MeshPhongMaterial({ color: defaultFoodColor, shininess: 100 });
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);

        let snake = [];
        let direction = { x: 1, z: 0 };
        let nextDirection = { x: 1, z: 0 };
        let food;
        let score = 0;
        let gameOver = false;
        let isPaused = false; 
        
        let baseSpeed = 150; 
        let moveInterval = baseSpeed;
        let lastMoveTime = 0;
        const gridSize = 20;

        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const closeSettings = document.getElementById('close-settings');

        // Settings මෙනුව විවෘත කිරීම
        settingsBtn.addEventListener('click', () => {
            isPaused = true; 
            settingsModal.style.display = 'block';
        });

        // Settings මෙනුව වැසීම
        closeSettings.addEventListener('click', () => {
            isPaused = false; 
            settingsModal.style.display = 'none';
        });

        // --- වර්ණ වෙනස් කිරීමේ නිවැරදි කළ කේතය ---
        document.getElementById('snake-color').addEventListener('input', (e) => {
            snakeMaterial.color = new THREE.Color(e.target.value);
        });

        document.getElementById('food-color').addEventListener('input', (e) => {
            foodMaterial.color = new THREE.Color(e.target.value);
        });

        document.getElementById('grid-color').addEventListener('input', (e) => {
            // පරණ Grid එක අයින් කර අලුත් එකක් ත්‍රිමාණ වර්ණ (THREE.Color) හරහා එක් කිරීම
            scene.remove(gridHelper); 
            let newGridColor = new THREE.Color(e.target.value);
            gridHelper = new THREE.GridHelper(20, 20, newGridColor, 0x444444);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper); 
        });

        document.getElementById('speed-slider').addEventListener('input', (e) => {
            let speedLevel = parseInt(e.target.value);
            baseSpeed = 250 - ((speedLevel - 1) * 22);
            moveInterval = baseSpeed; 
        });
        // ----------------------------------------

        function initSnake() {
            const head = new THREE.Mesh(boxGeometry, snakeMaterial);
            head.position.set(0, 0, 0);
            scene.add(head);
            snake.push(head);
        }

        function spawnFood() {
            if (food) scene.remove(food);
            let foodX, foodZ, valid = false;
            while (!valid) {
                foodX = Math.floor(Math.random() * gridSize) - gridSize / 2;
                foodZ = Math.floor(Math.random() * gridSize) - gridSize / 2;
                valid = true;
                for (let part of snake) {
                    if (part.position.x === foodX && part.position.z === foodZ) valid = false;
                }
            }
            food = new THREE.Mesh(boxGeometry, foodMaterial);
            food.position.set(foodX, 0, foodZ);
            scene.add(food);
        }

        window.addEventListener('keydown', (e) => {
            if(isPaused || gameOver) return;
            if (e.key === 'ArrowUp' && direction.z === 0) nextDirection = { x: 0, z: -1 };
            if (e.key === 'ArrowDown' && direction.z === 0) nextDirection = { x: 0, z: 1 };
            if (e.key === 'ArrowLeft' && direction.x === 0) nextDirection = { x: -1, z: 0 };
            if (e.key === 'ArrowRight' && direction.x === 0) nextDirection = { x: 1, z: 0 };
        });

        function animate(time) {
            if (gameOver) return;
            requestAnimationFrame(animate);

            if (!isPaused && (time - lastMoveTime > moveInterval)) {
                moveSnake();
                lastMoveTime = time;
            }
            renderer.render(scene, camera);
        }

        function moveSnake() {
            direction = { ...nextDirection };
            const head = snake[0].position;
            const newX = head.x + direction.x;
            const newZ = head.z + direction.z;
            const limit = gridSize / 2;

            if (newX >= limit || newX < -limit || newZ >= limit || newZ < -limit) return endGame();

            for (let i = 0; i < snake.length; i++) {
                if (snake[i].position.x === newX && snake[i].position.z === newZ) return endGame();
            }

            const newHead = new THREE.Mesh(boxGeometry, snakeMaterial);
            newHead.position.set(newX, 0, newZ);
            scene.add(newHead);
            snake.unshift(newHead);

            if (newX === food.position.x && newZ === food.position.z) {
                score += 10;
                document.getElementById('score').innerText = score;
                // උපරිම වේග සීමාවක් පවත්වා ගැනීම
                if(moveInterval > 40) moveInterval -= 2; 
                spawnFood();
            } else {
                scene.remove(snake.pop());
            }
        }

        function endGame() {
            gameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        initSnake();
        spawnFood();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
